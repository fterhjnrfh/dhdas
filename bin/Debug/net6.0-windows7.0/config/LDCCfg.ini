[SystemParameter]
;报警文件存储路径
LDCSavePath = C:\Users\niy\Desktop
;UDP信息
LDCIP = 192.168.0.14
LDCPort = 7000
;UDP发送间隔ms
LDCInterval = 2000

;源设备标识
MachineMark = 01007300
;目的设备标识
DestinationMachineMark = 020D5204
;信息单元个数
CellCount = 1

;信息单元第一个
;信息单元通道数
CellChannelCount0 = 8
;信息单元标识
CellMark0 = 0D07
