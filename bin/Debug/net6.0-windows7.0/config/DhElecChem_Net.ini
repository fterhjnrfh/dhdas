; 警告以下通道类型的编号与软件内部相关，不可随意调整;
; AcqTypeID:1 信号源;2 电压;3 电流 量程;4 电流 滤波;
; ver : -1默认7000之前的仪器基本已经不使用，可以作为通用配置;
; ver:1 最早的一个版本,也就是老的7001;ver:2 DH7000;ver:3 DH7001;ver:4 7002;ver:5 7006(多通道);ver:6 7003,7003C;
; ver:7 7003-2 电流增加2A;ver:8 7000_A(Dh7000_A.ini);ver:9 7000_1(单，通道同7003);ver:0x0A 7005;ver:0x0b 7003_A;
; ver:0x0C 7000_C(7005基础上,使用7000档位);ver:0x0D 7001_A(7000_C增加档位 2A)
; 7002+功放说明:常规不支持交流阻抗+平衡结果下传,根据不同调理器配置;
; 7002+7102攻放 ;信号源既有恒压也有恒流：考虑以后多档量程的可能，配置中根据电路类型区分量程,不再使用CircuitTypeHandover逻辑。
; 信号源通道电阻值（恒流方法使用）计算规则：量程2A及以下，电阻值=1V/满度量程；2A以上，默认=0.5

