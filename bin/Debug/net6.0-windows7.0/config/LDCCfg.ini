AI1-03 = 0_2
AI1-04 = 0_3
AI1-05 = 0_4
AI1-06 = 0_5
AI1-07 = 0_6
AI1-08 = 0_7

[LeiDaChe]
ControllerType=3
;1:控制器1;2:控制器2;3:第二套雷达车，单台
;计算间隔时间
CalcIntervalSeconds=2
;车底盘信息创建的机号
GroupID=2
;第一套：工作模式 1-0x01,工作模式一,2-0x10,工作模式二,0-0x11,调试模式
;第二套：工作模式 0-0x01,调试模式,		3-0x00,非调试模式;
WorkMode=3
;CAN信息不发送持续时间，停止采样，关机
NoCANDataSeconds=900
;电源断电持续时间，停止采样，关机
